name: Daily Tender Scan

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST daily
  workflow_dispatch:         # allow manual trigger from GitHub Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render server
        run: |
          curl -s --max-time 60 --retry 3 --retry-delay 10 \
               https://jd-website-fullstack.onrender.com/ || true
          sleep 15

      - name: Trigger tender scan
        run: |
          curl -X POST https://jd-website-fullstack.onrender.com/tenders/scan \
               -H "Content-Type: application/json" \
               --max-time 180 \
               --retry 2 \
               --retry-delay 10
