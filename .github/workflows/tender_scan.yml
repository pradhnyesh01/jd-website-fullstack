name: Daily Tender Scan

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST daily
  workflow_dispatch:         # allow manual trigger from GitHub Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tender scan
        run: |
          curl -X POST https://jd-website-fullstack.onrender.com/tenders/scan \
               -H "Content-Type: application/json" \
               --max-time 30 \
               --retry 2
